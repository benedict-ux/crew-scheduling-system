<!DOCTYPE html>
<html>
<head>
    <title>Jollibee EDSA Kamias - Crew Scheduling</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #DC0000 0%, #FFC700 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Animated background circles */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -250px;
            right: -250px;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 900px;
            max-width: 95%;
            display: flex;
            position: relative;
            z-index: 1;
            margin: auto;
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #DC0000 0%, #B80000 100%);
            padding: 40px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-left h1 {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .login-left .bee-icon {
            font-size: 80px;
            margin: 15px 0 20px 0;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-left p {
            font-size: 18px;
            margin-bottom: 20px;
            opacity: 0.95;
        }

        .login-left .branch {
            font-size: 22px;
            font-weight: bold;
            color: #FFC700;
            margin-top: 20px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .login-right {
            flex: 1;
            padding: 40px 50px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h2 {
            color: #DC0000;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .login-right p {
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .input-group input:focus {
            outline: none;
            border-color: #DC0000;
            background: white;
            box-shadow: 0 0 0 3px rgba(220, 0, 0, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #DC0000 0%, #B80000 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(220, 0, 0, 0.3);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 0, 0, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 13px;
        }

        /* Loading overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(220, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-food {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .food-item {
            font-size: 50px;
            animation: bounce-food 0.6s ease-in-out infinite;
        }

        .food-item:nth-child(1) {
            animation-delay: 0s;
        }

        .food-item:nth-child(2) {
            animation-delay: 0.2s;
        }

        .food-item:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce-food {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .loading-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
                align-items: flex-start;
            }
            
            .login-container {
                flex-direction: column;
                width: 100%;
                max-width: 100%;
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
                box-shadow: none;
            }
            
            .login-left {
                padding: 35px 25px;
                min-height: auto;
            }
            
            .login-left h1 {
                font-size: 26px;
            }
            
            .login-left .bee-icon {
                font-size: 45px;
                margin: 8px 0;
            }
            
            .login-left p {
                font-size: 15px;
                margin: 0 0 8px 0;
            }
            
            .login-left .branch {
                font-size: 18px;
                padding: 12px 22px;
                margin-top: 12px;
            }
            
            .login-left img {
                width: 150px !important;
            }
            
            .login-right {
                padding: 35px 30px 40px 30px;
                flex: 1;
            }
            
            .login-right h2 {
                font-size: 26px;
                margin-bottom: 8px;
            }
            
            .login-right p {
                font-size: 14px;
                margin-bottom: 30px;
            }
            
            .input-group {
                margin-bottom: 22px;
            }
            
            .input-group label {
                font-size: 14px;
                margin-bottom: 6px;
            }
            
            .input-group input {
                padding: 13px 16px;
                font-size: 16px;
            }
            
            .login-btn {
                padding: 15px;
                font-size: 17px;
            }
            
            .footer-text {
                font-size: 12px;
                margin-top: 25px;
            }
            
            .food-item {
                font-size: 40px;
            }
            
            .loading-text {
                font-size: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .login-left {
                padding: 30px 20px;
            }
            
            .login-left h1 {
                font-size: 22px;
            }
            
            .login-left .bee-icon {
                font-size: 40px;
            }
            
            .login-left p {
                font-size: 14px;
            }
            
            .login-left .branch {
                font-size: 16px;
                padding: 10px 18px;
            }
            
            .login-left img {
                width: 130px !important;
            }
            
            .login-right {
                padding: 30px 25px 35px 25px;
            }
            
            .login-right h2 {
                font-size: 24px;
            }
            
            .login-right p {
                font-size: 13px;
            }
            
            .input-group {
                margin-bottom: 20px;
            }
            
            .input-group input {
                padding: 12px 15px;
                font-size: 15px;
            }
            
            .login-btn {
                padding: 14px;
                font-size: 16px;
            }
            
            .footer-text {
                margin-top: 20px;
            }
            
            .food-item {
                font-size: 35px;
            }
            
            .loading-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-food">
        <div class="food-item">🍔</div>
        <div class="food-item">🍗</div>
        <div class="food-item">🍟</div>
    </div>
    <div class="loading-text">Loading your dashboard...</div>
</div>

<div class="login-container">
    <div class="login-left">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 25px;">
            <img src="assets/jollibee-logo-text.png" alt="Jollibee Logo" style="width: 180px; height: auto; object-fit: contain;">
            <div class="bee-icon" style="font-size: 60px; margin: 0;">🍔</div>
            <p style="font-size: 16px; margin: 0 0 10px 0; opacity: 0.95; padding: 0 20px;">Crew Scheduling System</p>
            <div class="branch">EDSA Kamias Branch</div>
        </div>
    </div>

    <div class="login-right">
        <h2>Welcome Back!</h2>
        <p>Sign in to access your schedule and manage your shifts</p>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="email" onkeypress="handleEnterKey(event)">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" onkeypress="handleEnterKey(event)">
        </div>

        <button class="login-btn" onclick="login()">
            Sign In
        </button>

        <div class="footer-text">
            © 2026 Jollibee EDSA Kamias • Crew Portal
        </div>
    </div>
</div>

<script type="module" src="js/auth.js"></script>
<script>
    // Handle Enter key press to submit login
    function handleEnterKey(event) {
        if (event.key === 'Enter' || event.keyCode === 13) {
            event.preventDefault();
            login();
        }
    }

    // Show loading animation
    window.showLoading = function() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.classList.add('active');
        }
    };

    // Hide loading animation
    window.hideLoading = function() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.classList.remove('active');
        }
    };
</script>

</body>
</html>
