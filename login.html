<!DOCTYPE html>
<html>
<head>
    <title>Jollibee EDSA Kamias - Crew Scheduling</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jollibee EDSA Kamias Branch - Crew Scheduling and Management System">
    <meta name="theme-color" content="#DC0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JB EDKAM">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/jollibee-logo.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #DC0000 0%, #FFC700 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated floating circles */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            animation: float 4s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            animation: float 5s ease-in-out infinite reverse;
        }

        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .circle-1 {
            width: 200px;
            height: 200px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
            animation-duration: 3s;
        }

        .circle-2 {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 15%;
            animation-delay: 1s;
            animation-duration: 4s;
        }

        .circle-3 {
            width: 250px;
            height: 250px;
            bottom: 10%;
            right: 30%;
            animation-delay: 2s;
            animation-duration: 5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            33% {
                transform: translateY(-40px) translateX(30px);
            }
            66% {
                transform: translateY(30px) translateX(-30px);
            }
        }

        /* Full-Screen Loading Overlay - Hidden by default */
        .loading-overlay {
            display: none;
        }

        /* Loading Screen Styles */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #DC0000 0%, #B00000 50%, #8B0000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease-out;
        }

        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 199, 0, 0.3);
            border-top: 4px solid #FFC700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        .loading-subtext {
            font-size: 14px;
            opacity: 0.8;
            text-align: center;
            max-width: 300px;
        }

        /* Hide main content initially */
        .login-container {
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .login-container.loaded {
            opacity: 1;
        }

        /* Main Responsive Container */
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 900px;
            max-width: 100%;
            display: flex;
            z-index: 10;
            min-height: 500px;
            margin: auto;
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #DC0000 0%, #B80000 100%);
            padding: 40px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .login-left-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
            width: 100%;
        }

        .login-logo { 
            width: 150px;
            height: auto;
            object-fit: contain;
        }

        .bee-icon {
            font-size: 60px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-subtitle {
            font-size: 16px;
            opacity: 0.95;
        }

        .branch {
            font-size: 20px;
            font-weight: bold;
            color: #FFC700;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .login-right {
            flex: 1;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h2 {
            color: #DC0000;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-right p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Input styling */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #DC0000;
            box-shadow: 0 0 0 3px rgba(220, 0, 0, 0.1);
        }

        .login-btn {
            background: linear-gradient(135deg, #DC0000 0%, #B80000 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(220, 0, 0, 0.3);
            width: 100%;
            text-align: center;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 0, 0, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        .login-btn.loading .spinner {
            display: inline-block;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #999;
            font-size: 13px;
        }

        /* MOBILE & TABLET RESPONSIVENESS */
        @media (max-width: 768px) {
            body { 
                padding: 10px;
                align-items: center;
                justify-content: center;
            }
            
            .login-container {
                flex-direction: column;
                border-radius: 15px;
                width: 100%;
                max-width: 100%;
                min-height: auto;
                max-height: 90vh;
                overflow-y: auto;
            }
            
            .login-left {
                padding: 25px;
                flex: 0 0 auto;
                min-height: auto;
            }
            
            .login-left-content {
                gap: 12px;
                justify-content: center;
            }
            
            .login-logo {
                width: 100px;
                display: none;
            }
            
            .bee-icon {
                font-size: 40px;
            }
            
            .login-subtitle {
                font-size: 13px;
            }
            
            .branch {
                font-size: 16px;
                padding: 8px 16px;
            }
            
            .login-right {
                padding: 25px;
                flex: 1;
            }
            
            .login-right h2 {
                font-size: 24px;
            }
            
            .login-right p {
                font-size: 12px;
                margin-bottom: 20px;
            }
            
            .input-group input {
                padding: 11px 14px;
                font-size: 15px;
            }
            
            .login-btn {
                padding: 12px;
                font-size: 16px;
            }
            
            .food-item { 
                font-size: 40px; 
            }
        }

        /* SPECIAL CASE: Landscape Phones */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 10px;
                align-items: center;
                justify-content: center;
            }
            
            .login-container { 
                flex-direction: row;
                min-height: auto;
                max-height: 95vh;
            }
            
            .login-left { 
                display: none;
            }
            
            .login-right {
                padding: 20px 25px;
            }
            
            .login-right h2 {
                font-size: 22px;
                margin-bottom: 8px;
            }
            
            .login-right p {
                font-size: 11px;
                margin-bottom: 15px;
            }
            
            .input-group {
                margin-bottom: 12px;
            }
            
            .input-group label {
                font-size: 12px;
                margin-bottom: 4px;
            }
            
            .input-group input {
                padding: 8px 12px;
                font-size: 14px;
            }
            
            .login-btn {
                padding: 10px;
                font-size: 14px;
                margin-top: 12px;
            }
            
            .footer-text {
                font-size: 10px;
                margin-top: 12px;
            }
        }

        /* Extra small phones */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            
            .login-container {
                border-radius: 12px;
            }
            
            .login-left {
                padding: 20px;
            }
            
            .bee-icon {
                font-size: 35px;
            }
            
            .login-subtitle {
                font-size: 12px;
            }
            
            .branch {
                font-size: 14px;
                padding: 6px 12px;
            }
            
            .login-right {
                padding: 20px;
            }
            
            .login-right h2 {
                font-size: 22px;
            }
            
            .login-right p {
                font-size: 11px;
            }
            
            .input-group label {
                font-size: 12px;
            }
            
            .input-group input {
                padding: 10px 12px;
                font-size: 14px;
            }
            
            .login-btn {
                padding: 11px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen" class="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">🍔 Loading Jollibee Crew System</div>
    <div class="loading-subtext">Connecting to server, please wait...</div>
</div>

<!-- Floating circles for background animation -->
<div class="floating-circle circle-1"></div>
<div class="floating-circle circle-2"></div>
<div class="floating-circle circle-3"></div>

<div class="login-container">
    <div class="login-left">
        <div class="login-left-content">
            <img src="assets/jollibee-logo-text.png" alt="Jollibee Logo" class="login-logo">
            <div class="bee-icon">🍔</div>
            <p class="login-subtitle">Crew Scheduling System</p>
            <div class="branch">EDSA Kamias Branch</div>
        </div>
    </div>

    <div class="login-right">
        <h2>Welcome Back!</h2>
        <p>Sign in to access your schedule and manage your shifts</p>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="email" onkeypress="handleEnterKey(event)">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" onkeypress="handleEnterKey(event)">
        </div>

        <button class="login-btn" id="loginBtn" onclick="login()">
            <span class="btn-text">Sign In</span>
            <span class="spinner"></span>
        </button>

        <div class="footer-text">
            © 2026 Jollibee EDSA Kamias • Crew Portal
        </div>
    </div>
</div>

<script>
// Loading Screen Management
document.addEventListener('DOMContentLoaded', function() {
    const loadingScreen = document.getElementById('loadingScreen');
    const loginContainer = document.querySelector('.login-container');
    
    // Register Service Worker for caching
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
                console.log('Service Worker registered successfully:', registration.scope);
            })
            .catch(function(error) {
                console.log('Service Worker registration failed:', error);
            });
    }
    
    // Show main content after minimum loading time
    setTimeout(() => {
        loadingScreen.classList.add('fade-out');
        loginContainer.classList.add('loaded');
        
        // Remove loading screen from DOM after animation
        setTimeout(() => {
            loadingScreen.remove();
        }, 500);
    }, 1500); // Minimum 1.5 seconds loading time
});

// Hide loading screen when page is fully loaded
window.addEventListener('load', function() {
    const loadingScreen = document.getElementById('loadingScreen');
    const loginContainer = document.querySelector('.login-container');
    
    if (loadingScreen) {
        loadingScreen.classList.add('fade-out');
        loginContainer.classList.add('loaded');
        
        setTimeout(() => {
            if (loadingScreen.parentNode) {
                loadingScreen.remove();
            }
        }, 500);
    }
});
</script>

<script src="js/performance.js"></script>
<script type="module" src="js/auth.js"></script>
<script>
    // Handle Enter key press to submit login
    function handleEnterKey(event) {
        if (event.key === 'Enter' || event.keyCode === 13) {
            event.preventDefault();
            login();
        }
    }
</script>

</body>
</html>
