<!DOCTYPE html>
<html>
<head>
    <title>Schedule History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        @media print {
            /* Hide everything when printing */
            body.printing > *:not(#printContainer) {
                display: none !important;
            }
            
            body.printing {
                margin: 0;
                padding: 0;
            }
            
            #printContainer {
                display: block !important;
            }
            
            .day-schedule {
                page-break-after: always;
                page-break-inside: avoid;
                padding: 2px;
                margin: 0;
            }
            
            .day-schedule:last-child {
                page-break-after: auto;
            }
            
            .day-schedule h3 {
                font-size: 12px;
                margin: 1px 0;
                padding: 5px;
                background: #007bff;
                color: white;
                border-radius: 5px;
            }
            
            .day-schedule table {
                width: 100%;
                border-collapse: collapse;
                font-size: 8px;
            }
            
            .day-schedule th, .day-schedule td {
                border: 1px solid #000;
                padding: 2px 3px;
                line-height: 1.1;
            }
            
            .day-schedule th {
                background: #f8f9fa;
                font-size: 8px;
                padding: 3px;
            }
            
            .day-schedule td {
                font-size: 8px;
                height: 14px;
            }
            
            /* Make station and name columns more readable */
            .day-schedule td:nth-child(1) {
                font-weight: bold;
                font-size: 8px;
            }
            
            .day-schedule td:nth-child(2) {
                font-weight: bold;
                font-size: 9px;
            }
            
            .reminder-box {
                margin-top: 3px;
                padding: 3px 5px;
                background: #fff3cd;
                border: 2px solid #ffc107;
                border-radius: 5px;
                font-size: 6.5px;
                line-height: 1.3;
            }
            
            .reminder-box p {
                margin: 1px 0;
                line-height: 1.3;
            }
        }
    </style>
</head>
<body onload="loadHistory()">

<!-- Mobile Menu Toggle -->
<button class="mobile-menu-toggle">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="assets/jollibee-logo.png" alt="Jollibee" class="sidebar-logo">
        <h2>Crew Scheduling</h2>
        <p class="sidebar-subtitle">EDSA Kamias Branch</p>
    </div>
    <a href="manager.html">📊 Dashboard</a>
    <a href="schedule.html">📅 Weekly Schedule</a>
    <a href="profiles.html">👥 Crew Profiles</a>
    <a href="history.html">📜 History</a>
    <a href="password.html">🔒 Reset Password</a>
    <hr>
    <a href="#" onclick="logout()" style="color: #FFC700;">🚪 Logout</a>
</div>

<!-- Overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">
    <div class="card">
        <h1>Schedule History</h1>
        <p>View completed schedules that have been marked as done.</p>
    </div>

    <div class="card">
        <h2>Completed Schedules</h2>
        <div id="historyList" style="min-height: 200px;">
            <p style="color: #666; text-align: center; padding: 20px;">⏳ Loading history...</p>
        </div>
    </div>
</div>

<script type="module" src="js/history.js"></script>
<script>
    function toggleSidebar(event) {
        if (event) {
            event.stopPropagation();
            event.preventDefault();
        }
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }
    
    // Prevent sidebar from auto-opening on mobile
    document.addEventListener('DOMContentLoaded', function() {
        // Only the hamburger button should open the sidebar
        const menuToggle = document.querySelector('.mobile-menu-toggle');
        if (menuToggle) {
            menuToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                toggleSidebar();
            });
        }
        
        // Clicking overlay closes sidebar
        const overlay = document.getElementById('sidebarOverlay');
        if (overlay) {
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
        
        // Prevent any other clicks from affecting sidebar
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            // If click is not on sidebar or menu toggle, and sidebar is open, close it
            if (sidebar && sidebar.classList.contains('active')) {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                    document.getElementById('sidebarOverlay').classList.remove('active');
                }
            }
        }, true);
    });
</script>

</body>
</html>
