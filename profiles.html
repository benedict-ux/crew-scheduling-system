<!DOCTYPE html>
<html>
<head>
    <title>Crew Profiles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#DC0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JB EDKAM">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/jollibee-logo.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body onload="loadCrew()">

<!-- Mobile Menu Toggle -->
<button class="mobile-menu-toggle">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="assets/jollibee-logo.png" alt="Jollibee" class="sidebar-logo">
        <h2>Crew Scheduling</h2>
        <p class="sidebar-subtitle">EDSA Kamias Branch</p>
    </div>
    <a href="manager.html">📊 Dashboard</a>
    <a href="schedule.html">📅 Weekly Schedule</a>
    <a href="profiles.html">👥 Crew Profiles</a>
    <a href="healthcards-manager.html">🏥 Health Cards</a>
    <a href="history.html">📜 History</a>
    <a href="password.html">🔒 Reset Password</a>
    <hr>
    <a href="#" onclick="logout()" style="color: #FFC700;">🚪 Logout</a>
</div>

<!-- Overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">
    <div class="card">
        <h1>Crew Profiles Management</h1>
        <p>Manage crew availability, school schedules, attendance priority, and ranks.</p>
        <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
            <input type="text" id="crewSearchInput" placeholder="🔍 Search crew by name..." 
                onkeyup="searchCrew()" 
                style="flex: 1; padding: 10px 15px; font-size: 16px; border: 2px solid #ccc; border-radius: 5px;">
            <button onclick="document.getElementById('crewSearchInput').value=''; loadCrew()">Refresh Crew Profiles</button>
            <button onclick="openAddCrewModal()" style="background: #28a745;">➕ Add Crew Profile</button>
        </div>
    </div>

    <div class="card">
        <h2>Crew Profiles</h2>
        <div id="crewProfileDetails" style="min-height: 200px; padding: 20px; text-align: center;">
            <p style="color: #666; font-size: 16px;">⏳ Loading crew profiles...</p>
        </div>
    </div>
    
    <!-- Hidden elements that manager.js expects -->
    <div id="requestList" style="display:none;"></div>
    <div id="crewTable" style="display:none;"></div>
</div>

<script type="module" src="js/manager.js"></script>
<script>
    function toggleSidebar(event) {
        if (event) {
            event.stopPropagation();
            event.preventDefault();
        }
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }
    
    // Prevent sidebar from auto-opening on mobile
    document.addEventListener('DOMContentLoaded', function() {
        // Only the hamburger button should open the sidebar
        const menuToggle = document.querySelector('.mobile-menu-toggle');
        if (menuToggle) {
            menuToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                toggleSidebar();
            });
        }
        
        // Clicking overlay closes sidebar
        const overlay = document.getElementById('sidebarOverlay');
        if (overlay) {
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
        
        // Prevent any other clicks from affecting sidebar
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            // If click is not on sidebar or menu toggle, and sidebar is open, close it
            if (sidebar && sidebar.classList.contains('active')) {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                    document.getElementById('sidebarOverlay').classList.remove('active');
                }
            }
        }, true);
    });
</script>

</body>
</html>
