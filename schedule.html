        /* Hide print-only elements on screen */
        .print-header, .print-footer { display: none; }

        /* PRINT STYLES - Short Bond Paper (8.5" x 11"), 1 day per page */
        @media print {
            @page {
                size: 8.5in 11in portrait;
                margin: 8mm 8mm 8mm 8mm;
            }

            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            .sidebar, .no-print, .mobile-menu-toggle, .save-button-container,
            .reminder-box, .landscape-banner { display: none !important; }

            body { margin: 0; padding: 0; background: white; }
            .main { margin: 0 !important; padding: 0 !important; width: 100%; }
            #scheduleContainer { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }

            /* Each day = exactly 1 page, fill full height */
            .day-container {
                page-break-after: always !important;
                page-break-inside: avoid !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                height: 277mm !important;
                display: flex !important;
                flex-direction: column !important;
            }
            .day-container:last-child { page-break-after: avoid !important; }

            /* Hide the default h2/h3 */
            .day-container > h2,
            .day-container > h3 { display: none !important; }

            /* ── PRINT HEADER ── */
            .print-header {
                display: block !important;
                width: 100%;
                border: 2.5px solid #DC0000;
                margin-bottom: 3px;
                flex-shrink: 0;
            }
            .print-header-date {
                background: white !important;
                color: #DC0000 !important;
                text-align: center;
                font-size: 18pt !important;
                font-weight: 900 !important;
                padding: 5px 0 3px 0;
                letter-spacing: 1px;
                border-bottom: 2px solid #DC0000;
            }
            .print-header-branch {
                background: white !important;
                color: #DC0000 !important;
                text-align: center;
                font-size: 10pt !important;
                font-weight: 600 !important;
                padding: 3px 0;
            }

            /* ── TABLE WRAPPER fills remaining space ── */
            .day-container > div[style*="overflow-x"] {
                overflow: visible !important;
                flex: 1 !important;
                display: flex !important;
                flex-direction: column !important;
            }

            .day-container table {
                width: 100% !important;
                border-collapse: collapse !important;
                font-size: 9pt !important;
                table-layout: fixed !important;
                margin: 0 !important;
                flex: 1 !important;
            }

            /* Column widths - 8 cols */
            .day-container table th:nth-child(1),
            .day-container table td:nth-child(1) { width: 13% !important; }

            .day-container table td:nth-child(2) { width: 16% !important; }

            .day-container table th:nth-child(8),
            .day-container table td:nth-child(8) { width: 31% !important; }

                text-align: left !important;
                font-size: 9pt !important;
                vertical-align: middle !important;

<script type="module" src="js/schedule.js"></script>
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (sidebar && overlay) {
            const isActive = sidebar.classList.contains('active');
            
            if (isActive) {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            } else {
                sidebar.classList.add('active');
                overlay.classList.add('active');
            }
        }
    }
    
    function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (sidebar && overlay) {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        const menuToggle = document.querySelector('.mobile-menu-toggle');
        
        if (menuToggle) {
            menuToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                toggleSidebar();
            });
            
            menuToggle.addEventListener('touchstart', function(e) {
                e.stopPropagation();
                e.preventDefault();
                toggleSidebar();
            }, { passive: false });
        }
        
        window.addEventListener('orientationchange', function() {
            closeSidebar();
        });
        
        window.addEventListener('resize', function() {
            if (document.getElementById('sidebar').classList.contains('active')) {
                closeSidebar();
            }
        });
        
        const overlay = document.getElementById('sidebarOverlay');
        if (overlay) {
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                closeSidebar();
            });
        }
        
        const sidebar = document.getElementById('sidebar');
        if (sidebar) {
            const sidebarLinks = sidebar.querySelectorAll('a');
            sidebarLinks.forEach(link => {
                link.addEventListener('click', function() {
                    setTimeout(closeSidebar, 100);
                });
            });
        }
        
        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'SELECT' || e.target.closest('select')) {
                e.stopPropagation();
            }
        });
    });

    // ── PRINT: remove blank rows & fix rowspans before printing, restore after ──
    let _printBackup = null;

    window.addEventListener('beforeprint', function () {
        _printBackup = [];

        document.querySelectorAll('.day-container tbody').forEach(function (tbody) {
            // Collect all rows
            const allRows = Array.from(tbody.querySelectorAll('tr'));

            // Find blank rows and remove them, tracking their positions
            const blankRows = allRows.filter(r => r.classList.contains('blank-row'));
            blankRows.forEach(function (row) {
                _printBackup.push({ row: row, next: row.nextSibling, parent: row.parentNode });
                row.parentNode.removeChild(row);
            });

            // Fix station cell rowspans: each station cell now spans only shift rows (no blank rows)
            tbody.querySelectorAll('td.print-station-cell').forEach(function (cell) {
                const currentSpan = parseInt(cell.getAttribute('rowspan') || '1');
                const newSpan = Math.ceil(currentSpan / 2); // was shifts.length * 2, now shifts.length
                cell.setAttribute('rowspan', newSpan);
                cell.setAttribute('data-orig-rowspan', currentSpan); // save for restore
            });
        });
    });

    window.addEventListener('afterprint', function () {
        // Restore station cell rowspans first
        document.querySelectorAll('td.print-station-cell[data-orig-rowspan]').forEach(function (cell) {
            cell.setAttribute('rowspan', cell.getAttribute('data-orig-rowspan'));
            cell.removeAttribute('data-orig-rowspan');
        });

        // Re-insert blank rows in reverse order so positions stay correct
        if (_printBackup) {
            for (let i = _printBackup.length - 1; i >= 0; i--) {
                const { row, next, parent } = _printBackup[i];
                parent.insertBefore(row, next);
            }
            _printBackup = null;
        }
    });
</script>
