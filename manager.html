<!DOCTYPE html>
<html>
<head>
    <title>Manager Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Mobile Menu Toggle -->
<button class="mobile-menu-toggle">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="assets/jollibee-logo.png" alt="Jollibee" class="sidebar-logo">
        <h2>Crew Scheduling</h2>
        <p class="sidebar-subtitle">EDSA Kamias Branch</p>
    </div>
    <a href="manager.html">📊 Dashboard</a>
    <a href="schedule.html">📅 Weekly Schedule</a>
    <a href="profiles.html">👥 Crew Profiles</a>
    <a href="history.html">📜 History</a>
    <a href="password.html">🔒 Reset Password</a>
    <hr>
    <a href="#" onclick="logout()" style="color: #FFC700;">🚪 Logout</a>
</div>

<!-- Overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">

    <div class="card">
        <h1>Manager Dashboard</h1>

        <label for="startDate"><strong>Select Week Start Date (Monday)</strong></label>
        <input type="date" id="startDate" onchange="checkExistingSchedule()">
        
        <div id="scheduleWarning" style="display: none; margin-top: 10px; padding: 10px; background: #fff3cd; border: 1px solid #ffc107; border-radius: 5px; color: #856404;">
            ⚠️ <strong>Warning:</strong> A schedule already exists for this week!
        </div>

        <br><br>

        <button onclick="generateSchedule()">Generate Schedule</button>
        <button onclick="publishLatest()">Publish Schedule</button>
        
        <div style="margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; border: 2px solid #e0e0e0;">
            <h3 style="margin: 0 0 15px 0; color: #DC0000; font-size: 20px; font-weight: 600;">📅 Existing Schedules</h3>
            <div id="existingSchedulesList" style="font-size: 14px; color: #666;">
                Loading...
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Pending Unavailability Requests</h2>
        <div id="requestList"></div>
    </div>

    <div class="card">
        <h2>Crew Management</h2>
        <div id="crewTable"></div>
    </div>

</div>

<script type="module" src="js/manager.js"></script>
<script>
    function toggleSidebar(event) {
        if (event) {
            event.stopPropagation();
            event.preventDefault();
        }
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }
    
    // Prevent sidebar from auto-opening on mobile
    document.addEventListener('DOMContentLoaded', function() {
        // Only the hamburger button should open the sidebar
        const menuToggle = document.querySelector('.mobile-menu-toggle');
        if (menuToggle) {
            menuToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                toggleSidebar();
            });
        }
        
        // Clicking overlay closes sidebar
        const overlay = document.getElementById('sidebarOverlay');
        if (overlay) {
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
        
        // Prevent any other clicks from affecting sidebar
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            // If click is not on sidebar or menu toggle, and sidebar is open, close it
            if (sidebar && sidebar.classList.contains('active')) {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                    document.getElementById('sidebarOverlay').classList.remove('active');
                }
            }
        }, true);
    });
</script>

</body>
</html>
