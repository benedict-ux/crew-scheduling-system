<!DOCTYPE html>
<html>
<head>
    <title>Schedule History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <!-- SheetJS library for Excel export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        /* Hide print-only elements on screen */
        .hist-print-header, .hist-print-footer { display: none; }

        @media print {
            @page {
                size: 8.5in 11in portrait;
                margin: 8mm 8mm 8mm 8mm;
            }

            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            /* Hide everything except print container */
            body.printing > *:not(#printContainer) { display: none !important; }
            body.printing { margin: 0; padding: 0; }
            #printContainer { display: block !important; }

            /* Each day = 1 page */
            .day-schedule {
                page-break-after: always !important;
                page-break-inside: avoid !important;
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
                border: none !important;
                border-radius: 0 !important;
                width: 100% !important;
                height: 277mm !important;
                display: flex !important;
                flex-direction: column !important;
            }
            .day-schedule:last-child { page-break-after: avoid !important; }

            /* Hide screen-only day header */
            .day-schedule > h3.screen-day-header { display: none !important; }

            /* Print header */
            .hist-print-header {
                display: block !important;
                width: 100%;
                border: 2.5px solid #DC0000;
                margin-bottom: 3px;
                flex-shrink: 0;
            }
            .hist-print-header-date {
                background: white !important;
                color: #DC0000 !important;
                text-align: center;
                font-size: 18pt !important;
                font-weight: 900 !important;
                padding: 5px 0 3px 0;
                letter-spacing: 1px;
                border-bottom: 2px solid #DC0000;
            }
            .hist-print-header-branch {
                background: white !important;
                color: #DC0000 !important;
                text-align: center;
                font-size: 10pt !important;
                font-weight: 600 !important;
                padding: 3px 0;
            }

            /* Table wrapper fills remaining space */
            .day-schedule > .hist-table-wrap {
                flex: 1 !important;
                display: flex !important;
                flex-direction: column !important;
                overflow: visible !important;
            }

            .day-schedule table.hist-sched-table {
                width: 100% !important;
                border-collapse: collapse !important;
                font-size: 9pt !important;
                table-layout: fixed !important;
                margin: 0 !important;
                flex: 1 !important;
            }

            /* Column widths */
            .day-schedule table.hist-sched-table th:nth-child(1),
            .day-schedule table.hist-sched-table td:nth-child(1) { width: 13% !important; }
            .day-schedule table.hist-sched-table th:nth-child(2),
            .day-schedule table.hist-sched-table td:nth-child(2) { width: 16% !important; }
            .day-schedule table.hist-sched-table th:nth-child(3),
            .day-schedule table.hist-sched-table td:nth-child(3) { width: 16% !important; }
            .day-schedule table.hist-sched-table th:nth-child(4),
            .day-schedule table.hist-sched-table td:nth-child(4) { width: 6% !important; }
            .day-schedule table.hist-sched-table th:nth-child(5),
            .day-schedule table.hist-sched-table td:nth-child(5) { width: 6% !important; }
            .day-schedule table.hist-sched-table th:nth-child(6),
            .day-schedule table.hist-sched-table td:nth-child(6) { width: 6% !important; }
            .day-schedule table.hist-sched-table th:nth-child(7),
            .day-schedule table.hist-sched-table td:nth-child(7) { width: 6% !important; }
            .day-schedule table.hist-sched-table th:nth-child(8),
            .day-schedule table.hist-sched-table td:nth-child(8) { width: 31% !important; }

            .day-schedule table.hist-sched-table th {
                background: white !important;
                color: #DC0000 !important;
                border: 1.5px solid #000 !important;
                padding: 4px 2px !important;
                font-size: 8pt !important;
                font-weight: 700 !important;
                text-align: center !important;
                line-height: 1.2 !important;
            }
            .day-schedule table.hist-sched-table td {
                border: 1px solid #000 !important;
                padding: 8px 3px !important;
                font-size: 9pt !important;
                line-height: 1.3 !important;
                vertical-align: middle !important;
                text-align: center !important;
            }
            .hist-station-cell {
                font-weight: 700 !important;
                color: #DC0000 !important;
                text-align: left !important;
                font-size: 9pt !important;
                vertical-align: middle !important;
            }
            .hist-name-cell { font-weight: 700 !important; }

            /* Blank rows removed by JS before print */

            /* Hide unassigned special stations */
            tr.hide-if-unassigned { display: none !important; }

            /* Hide screen-only reminder box */
            .reminder-box { display: none !important; }

            /* Print footer */
            .hist-print-footer {
                display: block !important;
                margin-top: 4px;
                width: 100%;
                flex-shrink: 0;
            }
            .hist-print-footer table {
                width: 100% !important;
                border-collapse: collapse !important;
                font-size: 8pt !important;
            }
            .hist-print-footer td {
                border: 1px solid #000 !important;
                padding: 3px 5px !important;
                vertical-align: middle !important;
                font-size: 8pt !important;
                line-height: 1.4 !important;
            }
            .hist-print-footer .yellow-cell {
                background: #FFFF00 !important;
                font-weight: 700 !important;
                text-align: center !important;
                font-size: 9pt !important;
            }
            .hist-print-footer .bold-cell { font-weight: 700 !important; }
            .hist-print-footer .red-text { color: #DC0000 !important; font-weight: 700 !important; }
        }
    </style>
</head>
<body onload="loadHistory()">

<!-- Mobile Menu Toggle -->
<button class="mobile-menu-toggle">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="assets/jollibee-logo.png" alt="Jollibee" class="sidebar-logo">
        <h2>Crew Scheduling</h2>
        <p class="sidebar-subtitle">EDSA Kamias Branch</p>
    </div>

<!-- Overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">
    <div class="card">
        <h1>Schedule History</h1>
        <p>View completed schedules that have been marked as done.</p>
    </div>

    <div class="card">
        <h2>Completed Schedules</h2>
        <div id="historyList" style="min-height: 200px;">
            <p style="color: #666; text-align: center; padding: 20px;">⏳ Loading history...</p>
        </div>
    </div>
</div>

<script type="module" src="js/history.js"></script>
<script>
    function toggleSidebar(event) {
        if (event) {
            event.stopPropagation();
            event.preventDefault();
        }
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }
    
    // Prevent sidebar from auto-opening on mobile
    document.addEventListener('DOMContentLoaded', function() {
        // Only the hamburger button should open the sidebar
        const menuToggle = document.querySelector('.mobile-menu-toggle');
        if (menuToggle) {
            menuToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                toggleSidebar();
            });
        }
        
        // Clicking overlay closes sidebar
        const overlay = document.getElementById('sidebarOverlay');
        if (overlay) {
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
        
        // Prevent any other clicks from affecting sidebar
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            // If click is not on sidebar or menu toggle, and sidebar is open, close it
            if (sidebar && sidebar.classList.contains('active')) {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                    document.getElementById('sidebarOverlay').classList.remove('active');
                }
            }
        }, true);
    });

    // ── PRINT: remove blank rows & fix rowspans before printing, restore after ──
    let _histPrintBackup = null;

    window.addEventListener('beforeprint', function () {
        _histPrintBackup = [];
        document.querySelectorAll('.day-schedule tbody').forEach(function (tbody) {
            const blankRows = Array.from(tbody.querySelectorAll('tr.hist-blank-row'));
            blankRows.forEach(function (row) {
                _histPrintBackup.push({ row: row, next: row.nextSibling, parent: row.parentNode });
                row.parentNode.removeChild(row);
            });
            tbody.querySelectorAll('td.hist-station-cell').forEach(function (cell) {
                const currentSpan = parseInt(cell.getAttribute('rowspan') || '1');
                const newSpan = Math.ceil(currentSpan / 2);
                cell.setAttribute('rowspan', newSpan);
                cell.setAttribute('data-orig-rowspan', currentSpan);
            });
        });
    });

    window.addEventListener('afterprint', function () {
        document.querySelectorAll('td.hist-station-cell[data-orig-rowspan]').forEach(function (cell) {
            cell.setAttribute('rowspan', cell.getAttribute('data-orig-rowspan'));
            cell.removeAttribute('data-orig-rowspan');
        });
        if (_histPrintBackup) {
            for (let i = _histPrintBackup.length - 1; i >= 0; i--) {
                const { row, next, parent } = _histPrintBackup[i];
                parent.insertBefore(row, next);
            }
            _histPrintBackup = null;
        }
    });
</script>

</body>
</html>
