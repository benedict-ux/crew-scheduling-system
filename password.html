<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-input {
            width: 100%;
            padding: 12px 15px;
            padding-right: 50px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        
        /* Explicitly override the global button styles */
        .eye-button {
            position: absolute !important;
            right: 10px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            height: 36px !important;
            width: 36px !important;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: #666 !important;
            z-index: 10 !important;
            padding: 0 !important;
            margin: 0 !important;
            transition: color 0.2s ease !important;
            min-width: auto !important;
            min-height: auto !important;
        }
        
        .eye-button:hover {
            color: #333 !important;
            background: none !important;
            box-shadow: none !important;
            transform: translateY(-50%) !important;
        }
        
        .eye-button:active {
            color: #DC0000 !important;
            background: none !important;
            box-shadow: none !important;
            transform: translateY(-50%) !important;
        }
        
        .eye-button svg {
            flex-shrink: 0;
            pointer-events: none;
        }
        
        /* Mobile-specific adjustments */
        @media (max-width: 768px) {
            .password-input {
                padding: 14px 15px;
                padding-right: 50px;
                font-size: 16px; /* Prevents zoom on iOS */
                min-height: 48px; /* Better touch target */
            }
            
            .eye-button {
                right: 8px !important;
                height: 40px !important;
                width: 40px !important;
                top: 50% !important;
                transform: translateY(-50%) !important;
            }
            
            .eye-button:hover,
            .eye-button:active {
                transform: translateY(-50%) !important;
            }
        }
    </style>
</head>
<body>

<!-- Mobile Menu Toggle -->
<button class="mobile-menu-toggle">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="assets/jollibee-logo.png" alt="Jollibee" class="sidebar-logo">
        <h2>Crew Scheduling</h2>
        <p class="sidebar-subtitle">EDSA Kamias Branch</p>
    </div>
    <div id="sidebarLinks">
        <!-- Default links while loading -->
        <a href="manager.html">📊 Dashboard</a>
        <a href="schedule.html">📅 Weekly Schedule</a>
        <a href="profiles.html">👥 Crew Profiles</a>
        <a href="history.html">📜 History</a>
        <a href="password.html">🔒 Reset Password</a>
    </div>
    <hr>
    <a href="#" onclick="logout()" style="color: #FFC700;">🚪 Logout</a>
</div>

<!-- Overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="main">
    <div class="card">
        <h1>🔒 Reset Password</h1>
        <p>Change your account password securely.</p>
    </div>

    <div class="card">
        <h2 id="pageTitle">Reset Password</h2>
        
        <form id="passwordResetForm" onsubmit="resetPassword(); return false;" style="max-width: 500px; margin: 0 auto;">
            <!-- Hidden username field for accessibility/autofill -->
            <input type="text" name="username" autocomplete="username" style="display: none;" aria-hidden="true">
            
            <div style="margin-bottom: 20px;">
                <label for="currentPassword" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">Current Password</label>
                <div class="password-container">
                    <input type="password" id="currentPassword" name="current-password" autocomplete="current-password" placeholder="Enter current password" class="password-input" onfocus="this.style.borderColor='#FFC700'" onblur="this.style.borderColor='#e0e0e0'">
                    <button type="button" onclick="togglePasswordVisibility('currentPassword', 'eyeIconCurrent')" class="eye-button" title="Show/Hide Password">
                        <svg id="eyeIconCurrent" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="newPassword" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">New Password</label>
                <div class="password-container">
                    <input type="password" id="newPassword" name="new-password" autocomplete="new-password" placeholder="Enter new password" class="password-input" onfocus="this.style.borderColor='#FFC700'" onblur="this.style.borderColor='#e0e0e0'">
                    <button type="button" onclick="togglePasswordVisibility('newPassword', 'eyeIconNew')" class="eye-button" title="Show/Hide Password">
                        <svg id="eyeIconNew" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <small style="color: #666; font-size: 13px; display: block; margin-top: 5px;">Minimum 6 characters</small>
            </div>

            <div style="margin-bottom: 25px;">
                <label for="confirmPassword" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">Confirm New Password</label>
                <div class="password-container">
                    <input type="password" id="confirmPassword" name="confirm-password" autocomplete="new-password" placeholder="Re-enter new password" class="password-input" onfocus="this.style.borderColor='#FFC700'" onblur="this.style.borderColor='#e0e0e0'">
                    <button type="button" onclick="togglePasswordVisibility('confirmPassword', 'eyeIconConfirm')" class="eye-button" title="Show/Hide Password">
                        <svg id="eyeIconConfirm" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div style="display: flex; gap: 12px; justify-content: center;">
                <button type="submit" style="
                    background: linear-gradient(135deg, #DC0000 0%, #B00000 100%);
                    color: white;
                    border: none;
                    padding: 12px 30px;
                    font-size: 15px;
                    font-weight: 600;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                    box-shadow: none !important;
                " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='none'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                    💾 Save Password
                </button>
                
                <button type="button" onclick="cancelReset()" style="
                    background: #6c757d;
                    color: white;
                    border: none;
                    padding: 12px 30px;
                    font-size: 15px;
                    font-weight: 600;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: all 0.2s ease;
                    box-shadow: none !important;
                " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='none'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                    ❌ Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    let userRole = '';
    let userEmail = '';

    // Toggle password visibility function
    window.togglePasswordVisibility = function(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        
        if (input.type === 'password') {
            input.type = 'text';
            // Change to eye-off icon (with slash)
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
            input.type = 'password';
            // Change back to eye icon
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    };

    // Check user role and update UI
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userEmail = user.email;
            console.log("Logged in user:", userEmail);
            
            try {
                // Try to find user by email
                let usersQuery = query(collection(db, "users"), where("email", "==", user.email));
                let usersSnapshot = await getDocs(usersQuery);
                
                // If not found, try lowercase email
                if (usersSnapshot.empty) {
                    console.log("Trying lowercase email...");
                    usersQuery = query(collection(db, "users"), where("email", "==", user.email.toLowerCase()));
                    usersSnapshot = await getDocs(usersQuery);
                }
                
                if (!usersSnapshot.empty) {
                    const userData = usersSnapshot.docs[0].data();
                    userRole = userData.role || 'crew';
                    
                    console.log("User data found:", userData);
                    console.log("User role detected:", userRole);
                    
                    // Update page title
                    const pageTitle = document.getElementById('pageTitle');
                    if (userRole === 'manager') {
                        pageTitle.textContent = "Reset Manager's Password";
                    } else {
                        pageTitle.textContent = "Reset Crew Password";
                    }
                    
                    // Load appropriate sidebar
                    loadSidebar(userRole);
                } else {
                    console.error("No user document found in Firestore for:", user.email);
                    console.log("Defaulting to crew role");
                    
                    // Default to crew if not found
                    userRole = 'crew';
                    document.getElementById('pageTitle').textContent = "Reset Password";
                    loadSidebar('crew');
                }
            } catch (e) {
                console.error("Error checking user role:", e);
                // Default to crew on error
                userRole = 'crew';
                loadSidebar('crew');
            }
        } else {
            window.location.href = "login.html";
        }
    });

    // Load sidebar based on role
    function loadSidebar(role) {
        const sidebarLinks = document.getElementById('sidebarLinks');
        
        if (role === 'manager') {
            sidebarLinks.innerHTML = `
                <a href="manager.html">📊 Dashboard</a>
                <a href="schedule.html">📅 Weekly Schedule</a>
                <a href="profiles.html">👥 Crew Profiles</a>
                <a href="history.html">📜 History</a>
                <a href="password.html">🔒 Reset Password</a>
            `;
        } else {
            sidebarLinks.innerHTML = `
                <a href="crew.html">📅 My Schedule</a>
                <a href="password.html">🔒 Reset Password</a>
            `;
        }
    }

    // Reset password function
    window.resetPassword = async function() {
        console.log("Reset password button clicked");
        
        const currentPassword = document.getElementById('currentPassword').value.trim();
        const newPassword = document.getElementById('newPassword').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();

        // Validation
        if (!currentPassword || !newPassword || !confirmPassword) {
            alert('❌ Please fill in all fields.');
            return;
        }

        if (newPassword.length < 6) {
            alert('❌ New password must be at least 6 characters long.');
            return;
        }

        if (newPassword !== confirmPassword) {
            alert('❌ New passwords do not match.');
            return;
        }

        if (currentPassword === newPassword) {
            alert('❌ New password must be different from current password.');
            return;
        }

        try {
            const user = auth.currentUser;
            console.log("Current user email:", user.email);
            console.log("Stored userRole:", userRole);
            
            // Re-authenticate user with current password
            const credential = EmailAuthProvider.credential(user.email, currentPassword);
            await reauthenticateWithCredential(user, credential);
            console.log("Re-authentication successful");
            
            // Update password
            await updatePassword(user, newPassword);
            console.log("Password updated successfully");
            
            alert('✅ Password updated successfully!');
            
            // Clear form
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            
            // Redirect based on role
            console.log("Redirecting based on role:", userRole);
            
            if (userRole === 'manager') {
                console.log("Redirecting to manager.html");
                window.location.href = 'manager.html';
            } else {
                console.log("Redirecting to crew.html");
                window.location.href = 'crew.html';
            }
        } catch (error) {
            console.error("Error updating password:", error);
            
            if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                alert('❌ Current password is incorrect.');
            } else if (error.code === 'auth/weak-password') {
                alert('❌ New password is too weak.');
            } else {
                alert('❌ Error updating password: ' + error.message);
            }
        }
    };

    // Cancel and go back
    window.cancelReset = function() {
        console.log("Cancel clicked, userRole:", userRole);
        
        if (userRole === 'manager') {
            window.location.href = 'manager.html';
        } else {
            window.location.href = 'crew.html';
        }
    };

    // Logout function
    window.logout = async function() {
        try {
            await signOut(auth);
            window.location.href = "login.html";
        } catch (error) {
            console.error("Error logging out:", error);
            alert("Error logging out. Please try again.");
        }
    };

    // Toggle sidebar for mobile
    function toggleSidebar(event) {
        if (event) {
            event.stopPropagation();
            event.preventDefault();
        }
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }
    
    // Prevent sidebar from auto-opening on mobile
    document.addEventListener('DOMContentLoaded', function() {
        const menuToggle = document.querySelector('.mobile-menu-toggle');
        if (menuToggle) {
            menuToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                toggleSidebar();
            });
        }
        
        const overlay = document.getElementById('sidebarOverlay');
        if (overlay) {
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
        
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (sidebar && sidebar.classList.contains('active')) {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                    document.getElementById('sidebarOverlay').classList.remove('active');
                }
            }
        }, true);
    });
</script>

</body>
</html>
